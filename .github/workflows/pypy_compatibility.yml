name: Workflow for PyPy Compatibility - Run Partial Tests with pytest

on:
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pypy-version: ["pypy3.11"]

    steps:
      - uses: actions/checkout@v5
      - name: Set up PyPy ${{ matrix.pypy-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.pypy-version }}
      - name: Install dependencies
        # This job never runs ruff/mypy, so skip them: mypy 2.x pulls in
        # ast-serialize (Rust/PyO3), which needs a slow cargo build under PyPy.
        # `coverage` stays: run_tests.py imports it unconditionally at module level.
        run: |
          pypy -m ensurepip
          pypy -m pip install --upgrade pip
          grep -v -E '^(ruff|mypy)==' Requirements.txt > requirements-pypy.txt
          pypy -m pip install -r requirements-pypy.txt
      - name: Testing
        run: |
          pypy ./run_tests.py -s -hko -d -i
