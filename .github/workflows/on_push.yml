name: Workflow on Push - Run Partial Tests with pytest

on:
  push:
    branches: [ main ] # post-merge sanity only; PR branches are covered by the PR workflow

jobs:
  test-on-ubuntu:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.14"]

    steps:
      - uses: actions/checkout@v5
      - name: Set up python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f Requirements.txt ]; then pip install -r Requirements.txt; fi
          mypy --disable-error-code=import-untyped .
          mypy --install-types --non-interactive
      - name: Testing, linting, and statc type checking
        run: |
          chmod +x ./run_tests.py
          ./run_tests.py -ruff -mypy -d

  test-on-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@v5
      - name: Set up python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f Requirements.txt ]; then pip install -r Requirements.txt; fi
          mypy --disable-error-code=import-untyped .
          mypy --install-types --non-interactive
      - name: Testing, linting, and statc type checking
        run: |
          chmod +x ./run_tests.py
          ./run_tests.py -ruff -mypy -d

  test-on-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@v5
      - name: Set up python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if (Test-Path "Requirements.txt") { python -m pip install -r "Requirements.txt" }
          mypy --disable-error-code=import-untyped .
          mypy --install-types --non-interactive
      - name: Testing, linting, and statc type checking
        run: |
          chcp.com 65001
          $env:PYTHONIOENCODING = "utf-8"
          python ./run_tests.py -ruff -mypy -d
